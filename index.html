<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Acesso - Ateliê da Fernanda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=6" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: var(--bg); }
    .portal-box { background: var(--card); border: 1px solid var(--border); box-shadow: var(--sh-m); border-radius: var(--r-xl); padding: 40px; text-align: center; max-width: 500px; width: 100%; border-top: 6px solid var(--accent); }
    .portal-box h1 { font-size: 1.6rem; color: var(--ink); margin-bottom: 8px; line-height: 1.3;}
    .portal-box p { color: var(--ink-2); margin-bottom: 32px; font-size: .95rem; }
    .portal-links { display: flex; flex-direction: column; gap: 16px; }
    .portal-btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; border-radius: var(--r-l); background: var(--accent-glass); color: var(--accent); border: 2px solid var(--accent); font-weight: 600; font-size: 1.05rem; transition: all var(--tr); text-decoration: none;}
    .portal-btn:hover { background: var(--accent); color: #fff; transform: translateY(-3px); box-shadow: var(--sh-s); border-color: var(--accent);}
    .portal-btn svg { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <div class="portal-box">
    <h1>✨ Bem-vinda ao seu Hub Escolar</h1>
    <p>Escolha qual área de membros você deseja acessar ou editar agora:</p>
    <div class="portal-links">
      <a href="sousplat/" class="portal-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
        Entrar no curso Sousplat
      </a>
      <a href="felpudo/" class="portal-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        Entrar no curso Arte de Felpudo
      </a>
    </div>
  </div>
</body>
</html>
